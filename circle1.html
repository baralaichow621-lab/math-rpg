<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圓周魔王大戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #020617; color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-ui { height: 750px; width: 100%; max-width: 400px; }
        #stage { position: relative; height: 160px; background: linear-gradient(to bottom, #1e293b 0%, #334155 100%); border-bottom: 8px solid #475569; }
        .entity { position: absolute; bottom: 10px; transition: all 0.3s ease; font-size: 60px; user-select: none; }
        #player-sprite { left: 30px; }
        #monster-sprite { right: 30px; }
        #q-box { font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .back-btn { position: absolute; top: 10px; left: 10px; font-size: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; z-index: 50; border: 1px solid #475569; }
    </style>
</head>
<body>

    <div id="game-ui" class="bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl relative border-4 border-slate-800 flex flex-col">
        <button class="back-btn" onclick="location.href='index.html'">⬅ 返回登入</button>

        <div class="p-4 bg-slate-950 border-b border-slate-800 pt-12">
            <div class="flex justify-between items-center mb-2">
                <div>
                    <span id="p-name-disp" class="text-white font-bold">載入中</span>
                    <span class="text-yellow-500 font-black ml-2">LV.<span id="p-lv-disp">1</span></span>
                </div>
                <div class="text-[10px] text-slate-400">ATK:<span id="s-atk">0</span> SPI:<span id="s-spi">0</span></div>
            </div>
            <div class="h-2 bg-slate-800 rounded-full overflow-hidden"><div id="p-hp-bar" class="h-full bg-red-500 w-full"></div></div>
        </div>

        <div id="stage">
            <div id="player-sprite" class="entity">👤</div>
            <div id="monster-sprite" class="entity">👾</div>
            <div class="absolute top-2 right-4"><div class="w-24 h-1.5 bg-slate-800 rounded-full"><div id="m-hp-bar" class="h-full bg-red-500 w-full"></div></div></div>
        </div>

        <div class="p-6 flex-1 flex flex-col justify-center gap-4">
            <div class="bg-slate-800 p-4 rounded-2xl text-center border-2 border-blue-500">
                <div id="q-box" class="font-bold">正在召喚魔王...</div>
            </div>
            <input type="number" id="ans-input" inputmode="decimal" placeholder="?" class="w-full bg-black border-2 border-slate-700 rounded-2xl p-4 text-center text-5xl font-black text-blue-400 outline-none">
            <button onclick="checkAnswer()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-2xl shadow-[0_4px_0_rgb(29,78,216)] active:translate-y-1 active:shadow-none">發動攻擊 💥</button>
            <p id="feedback" class="text-center h-4 text-sm font-bold"></p>
        </div>
    </div>

    <script>
        let rawData = localStorage.getItem('currentPlayer');
        let player = rawData ? JSON.parse(rawData) : { name: "新冒險者", job: "新手", lv: 1, hp: 100, atk: 10, spi: 10 };

        let state = {
            lv: parseInt(player.lv) || 1,
            hp: parseInt(player.hp) || 100,
            maxHp: parseInt(player.hp) || 100,
            atk: parseInt(player.atk) || 10,
            spi: parseInt(player.spi) || 10,
            ans: 0,
            mHP: 100, mMaxHP: 100
        };

        const jobIcons = { '戰士': '🤺', '魔法師': '🧙', '法師': '🧙', '新手': '👤' };

        window.onload = () => {
            document.getElementById('p-name-disp').innerText = player.name;
            document.getElementById('player-sprite').innerText = jobIcons[player.job] || '👤';
            nextMonster();
        };

        function nextMonster() {
            // 已優化：第一隻怪血量從 70 降至 35，更適合新手
            state.mMaxHP = 10 + (state.lv * 5);
            state.mHP = state.mMaxHP;
            generateQuestion();
            updateUI();
        }

        function generateQuestion() {
            const inp = document.getElementById('ans-input');
            inp.value = ''; inp.focus();

            const useFraction = Math.random() > 0.5;
            const piVal = useFraction ? (22 / 7) : 3.14;
            const piText = useFraction ? "22/7" : "3.14";
            const nums = useFraction ? [7, 14, 21, 28] : [10, 20, 30, 40, 50];
            const v = nums[Math.floor(Math.random() * nums.length)];
            
            const type = Math.floor(Math.random() * 2); 
            if (type === 0) {
                state.ans = v * piVal;
                document.getElementById('q-box').innerHTML = `直徑 <span class="text-blue-400">${v}</span>，圓周是多少？(π=${piText})`;
            } else {
                const circleVal = (v * piVal).toFixed(2);
                state.ans = v;
                document.getElementById('q-box').innerHTML = `圓周 <span class="text-yellow-400">${circleVal}</span>，直徑是多少？(π=${piText})`;
            }
        }

        function checkAnswer() {
            const val = parseFloat(document.getElementById('ans-input').value);
            if (isNaN(val)) return;

            if (Math.abs(val - state.ans) < 0.15) {
                document.getElementById('feedback').innerText = "命中！";
                document.getElementById('feedback').style.color = "#4ade80";
                // 傷害計算：攻擊力 + 精神
                state.mHP -= (state.atk + state.spi);
                
                const p = document.getElementById('player-sprite');
                p.style.transform = 'translateX(150px)';
                setTimeout(() => p.style.transform = 'translateX(0)', 150);

                if(state.mHP <= 0) {
                    state.lv++;
                    player.lv = state.lv;
                    localStorage.setItem('currentPlayer', JSON.stringify(player));
                    setTimeout(nextMonster, 800);
                } else {
                    setTimeout(generateQuestion, 500);
                }
            } else {
                state.hp -= 10;
                document.getElementById('feedback').innerText = `失誤！`;
                document.getElementById('feedback').style.color = "#ef4444";
                if(state.hp <= 0) { alert("你倒下了..."); location.href='index.html'; }
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('p-lv-disp').innerText = state.lv;
            document.getElementById('s-atk').innerText = state.atk;
            document.getElementById('s-spi').innerText = state.spi;
            document.getElementById('p-hp-bar').style.width = (state.hp / state.maxHp * 100) + '%';
            document.getElementById('m-hp-bar').style.width = (state.mHP / state.mMaxHP * 100) + '%';
        }

        document.getElementById('ans-input').addEventListener('keypress', e => { if(e.key === 'Enter') checkAnswer(); });
    </script>
</body>
</html>
