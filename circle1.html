<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圓周魔王大戰 - 完整版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #020617; color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-ui { height: 750px; width: 100%; max-width: 400px; transition: transform 0.1s; }
        #stage { position: relative; height: 180px; background: linear-gradient(to bottom, #1e293b 0%, #334155 100%); border-bottom: 8px solid #475569; overflow: hidden; }
        .entity { position: absolute; bottom: 15px; transition: all 0.3s cubic-bezier(0.17, 0.88, 0.32, 1.2); font-size: 65px; user-select: none; }
        #player-sprite { left: 30px; }
        #monster-sprite { right: 30px; }
        
        /* 震動與閃爍動畫 */
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .flash { animation: flash 0.2s; }
        @keyframes flash { 0% { filter: brightness(1); } 50% { filter: brightness(5); } 100% { filter: brightness(1); } }
        
        .back-btn { position: absolute; top: 10px; left: 10px; font-size: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; z-index: 50; border: 1px solid #475569; }
        .stat-val { font-family: 'monospace'; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-ui" class="bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl relative border-4 border-slate-800 flex flex-col">
        <button class="back-btn" onclick="location.href='index.html'">⬅ 返回登入</button>

        <div class="p-4 bg-slate-950 border-b border-slate-800 pt-12">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <span id="p-name-disp" class="text-white font-bold text-lg">載入中</span>
                    <div class="text-yellow-500 font-black text-xl italic">LV.<span id="p-lv-disp">1</span></div>
                </div>
                <div class="grid grid-cols-1 gap-1 text-[11px] bg-slate-900 p-2 rounded-lg border border-slate-700">
                    <div class="flex justify-between gap-4">
                        <span class="text-red-400">⚔️ ATK</span>
                        <span id="s-atk" class="stat-val text-white">0</span>
                    </div>
                    <div class="flex justify-between gap-4">
                        <span class="text-blue-400">🛡️ DEF</span>
                        <span id="s-def" class="stat-val text-white">0</span>
                    </div>
                    <div class="flex justify-between gap-4">
                        <span class="text-purple-400">✨ SPI</span>
                        <span id="s-spi" class="stat-val text-white">0</span>
                    </div>
                </div>
            </div>
            <div class="h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                <div id="p-hp-bar" class="h-full bg-gradient-to-r from-red-500 to-rose-400 transition-all duration-300" style="width: 100%"></div>
            </div>
        </div>

        <div id="stage">
            <div id="player-sprite" class="entity">👤</div>
            <div id="monster-sprite" class="entity">👾</div>
            <div class="absolute top-4 right-4">
                <div class="text-[10px] text-right text-red-400 mb-1 font-bold">MONSTER HP</div>
                <div class="w-28 h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                    <div id="m-hp-bar" class="h-full bg-red-500 transition-all duration-300" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <div class="p-6 flex-1 flex flex-col justify-center gap-4">
            <div class="bg-slate-800 p-4 rounded-3xl text-center border-2 border-blue-500 shadow-inner">
                <div id="q-box" class="font-bold text-white leading-relaxed">正在召喚魔王...</div>
            </div>
            <input type="number" id="ans-input" inputmode="decimal" placeholder="ANSWER" class="w-full bg-black border-2 border-slate-700 rounded-2xl p-4 text-center text-5xl font-black text-blue-400 focus:border-blue-500 outline-none transition-colors">
            <button onclick="checkAnswer()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-2xl text-white shadow-[0_5px_0_rgb(29,78,216)] active:translate-y-1 active:shadow-none transition-all">發動攻擊 💥</button>
            <p id="feedback" class="text-center h-4 text-sm font-bold tracking-widest"></p>
        </div>
    </div>

    <script>
        // 音效系統 (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const monsters = ['👾', '🐉', '👹', '👻', '🐙', '🦖', '🦂'];
        let rawData = localStorage.getItem('currentPlayer');
        let player = rawData ? JSON.parse(rawData) : { name: "冒險者", job: "新手", lv: 1, hp: 100, atk: 10, spi: 10, def: 5 };

        let state = {
            lv: parseInt(player.lv) || 1,
            hp: parseInt(player.hp) || 100,
            maxHp: parseInt(player.hp) || 100,
            atk: parseInt(player.atk) || 10,
            spi: parseInt(player.spi) || 10,
            def: parseInt(player.def) || 5,
            ans: 0, mHP: 100, mMaxHP: 100
        };

        const jobIcons = { '戰士': '🤺', '魔法師': '🧙', '法師': '🧙', '新手': '👤' };

        window.onload = () => {
            document.getElementById('p-name-disp').innerText = player.name;
            document.getElementById('player-sprite').innerText = jobIcons[player.job] || '👤';
            nextMonster();
        };

        // 3. 怪物切換邏輯
        function nextMonster() {
            state.mMaxHP = 20 + (state.lv * 15);
            state.mHP = state.mMaxHP;
            // 隨機換怪物樣式
            document.getElementById('monster-sprite').innerText = monsters[Math.floor(Math.random() * monsters.length)];
            document.getElementById('monster-sprite').style.opacity = '1';
            generateQuestion();
            updateUI();
        }

        function generateQuestion() {
            const inp = document.getElementById('ans-input');
            inp.value = ''; inp.focus();

            const useFraction = Math.random() > 0.5;
            const piVal = useFraction ? (22 / 7) : 3.14;
            const piText = useFraction ? "22/7" : "3.14";
            const nums = useFraction ? [7, 14, 21, 28, 35] : [10, 20, 30, 40, 50];
            const v = nums[Math.floor(Math.random() * nums.length)];
            
            const type = Math.floor(Math.random() * 2); 
            if (type === 0) {
                state.ans = v * piVal;
                document.getElementById('q-box').innerHTML = `直徑 <span class="text-blue-400 font-bold">${v}</span>，圓周是多少？<br><span class="text-xs text-slate-400">(使用 π ≈ ${piText})</span>`;
            } else {
                const circleVal = (v * piVal).toFixed(2);
                state.ans = v;
                document.getElementById('q-box').innerHTML = `圓周 <span class="text-yellow-400 font-bold">${circleVal}</span>，直徑是多少？<br><span class="text-xs text-slate-400">(使用 π ≈ ${piText})</span>`;
            }
        }

        async function checkAnswer() {
            const val = parseFloat(document.getElementById('ans-input').value);
            if (isNaN(val)) return;

            const ui = document.getElementById('game-ui');
            const mSprite = document.getElementById('monster-sprite');
            const pSprite = document.getElementById('player-sprite');

            if (Math.abs(val - state.ans) < 0.15) {
                // 命中動畫與音效
                playSound(440, 'sine', 0.1); 
                setTimeout(() => playSound(880, 'sine', 0.1), 50);

                document.getElementById('feedback').innerText = "CRITICAL HIT!";
                document.getElementById('feedback').style.color = "#4ade80";
                
                state.mHP -= (state.atk + state.spi);
                
                // 玩家衝刺動畫
                pSprite.style.transform = 'translateX(180px) scale(1.2)';
                setTimeout(() => {
                    pSprite.style.transform = 'translateX(0) scale(1)';
                    mSprite.classList.add('flash', 'shake');
                    setTimeout(() => mSprite.classList.remove('flash', 'shake'), 300);
                }, 150);

                if(state.mHP <= 0) {
                    playSound(1200, 'square', 0.3); // 勝利音
                    mSprite.style.opacity = '0';
                    state.lv++;
                    player.lv = state.lv;
                    localStorage.setItem('currentPlayer', JSON.stringify(player));
                    document.getElementById('feedback').innerText = "LEVEL UP!";
                    setTimeout(nextMonster, 1000);
                } else {
                    setTimeout(generateQuestion, 600);
                }
            } else {
                // 錯誤動畫與音效
                playSound(150, 'sawtooth', 0.3);
                ui.classList.add('shake');
                setTimeout(() => ui.classList.remove('shake'), 300);

                // 計算扣血（加入防禦力抵減，最低扣 5）
                const damage = Math.max(5, 15 - state.def);
                state.hp -= damage;
                
                document.getElementById('feedback').innerText = `MISS! ANS: ${state.ans.toFixed(2)}`;
                document.getElementById('feedback').style.color = "#ef4444";
                
                if(state.hp <= 0) {
                    alert("冒險結束... 回到公會休養");
                    location.href='index.html';
                }
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('p-lv-disp').innerText = state.lv;
            document.getElementById('s-atk').innerText = state.atk;
            document.getElementById('s-def').innerText = state.def; // 顯示防禦
            document.getElementById('s-spi').innerText = state.spi;
            document.getElementById('p-hp-bar').style.width = (state.hp / state.maxHp * 100) + '%';
            document.getElementById('m-hp-bar').style.width = (state.mHP / state.mMaxHP * 100) + '%';
        }

        document.getElementById('ans-input').addEventListener('keypress', e => { if(e.key === 'Enter') checkAnswer(); });
    </script>
</body>
</html>
