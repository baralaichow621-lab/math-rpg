<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>副本：圓周魔王 - 冒險者公會</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; background: #1a1a2e; color: #4a3421;
            font-family: 'Press Start 2P', monospace;
        }

        /* 延用 menu.html 的羊皮紙容器風格 */
        .game-container {
            width: 100%; max-width: 500px; background: #f1e7c0;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            padding: 20px; border: 8px solid #4a3421; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* 戰鬥舞台區塊 */
        .battle-stage {
            height: 150px; background: rgba(0,0,0,0.05);
            border: 4px solid #8b5a2b; margin-bottom: 15px;
            position: relative; overflow: hidden;
            border-style: double;
        }

        .entity { position: absolute; bottom: 10px; transition: all 0.3s; font-size: 50px; user-select: none; }
        #player-sprite { left: 20px; }
        #monster-sprite { right: 20px; }

        /* 數據欄位 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: rgba(139, 90, 43, 0.1); padding: 8px; border: 2px solid #4a3421; font-size: 8px; }
        
        /* 血條樣式 */
        .bar-outer { height: 12px; background: #333; border: 2px solid #4a3421; margin-top: 4px; position: relative; }
        .bar-inner { height: 100%; width: 100%; transition: width 0.4s; }
        .hp-fill { background: #e74c3c; }
        .m-hp-fill { background: #9b59b6; }
        .bar-label { position: absolute; width: 100%; text-align: center; top: 2px; font-size: 6px; color: white; }

        /* 題目區塊 */
        .question-area { 
            background: #fffdf2; border: 4px dashed #8b5a2b; 
            padding: 15px; text-align: center; margin-bottom: 15px;
        }
        #q-text { font-size: 10px; line-height: 1.6; color: #4a3421; margin-bottom: 10px; }
        
        /* 輸入與按鈕 */
        input#ans-input {
            width: 80%; padding: 10px; border: 4px solid #4a3421; 
            background: white; color: #d35400; font-family: 'Press Start 2P';
            font-size: 18px; text-align: center; margin-bottom: 15px;
            outline: none;
        }

        .action-btn {
            width: 100%; padding: 15px; background: #8b5a2b; color: #fff;
            border: 4px solid #4a3421; font-family: 'Press Start 2P'; font-size: 10px;
            cursor: pointer; box-shadow: 4px 4px 0px #4a3421;
        }
        .action-btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .action-btn:disabled { background: #ccc; box-shadow: none; transform: none; }

        /* 小裝飾 */
        .back-link { font-size: 8px; cursor: pointer; text-decoration: underline; color: #8b5a2b; margin-top: 15px; display: block; text-align: center; }
        
        @keyframes damage {
            0% { transform: translate(0,0); }
            25% { transform: translate(5px,0); }
            50% { transform: translate(-5px,0); }
            75% { transform: translate(5px,0); }
            100% { transform: translate(0,0); }
        }
        .shake { animation: damage 0.2s; }
        
        .growth-pop {
            position: absolute; color: #27ae60; font-size: 10px; 
            animation: floatUp 1s forwards; pointer-events: none;
        }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-40px); } }
    </style>
</head>
<body>

<div class="game-container">
    <div style="font-size: 10px; margin-bottom: 10px; color: #8b5a2b; border-bottom: 2px solid #8b5a2b; padding-bottom: 5px;">
        任務：修練圓周運算 (π=3)
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            玩家 LV.<span id="p-lv">1</span>
            <div class="bar-outer"><div id="p-hp-bar" class="bar-inner hp-fill"></div><div class="bar-label">HP</div></div>
        </div>
        <div class="stat-box">
            魔王 <span id="m-name">守衛</span>
            <div class="bar-outer"><div id="m-hp-bar" class="bar-inner m-hp-fill"></div><div class="bar-label">BOSS</div></div>
        </div>
    </div>

    <div class="battle-stage" id="stage">
        <div id="player-sprite" class="entity">👤</div>
        <div id="monster-sprite" class="entity">👾</div>
    </div>

    <div class="question-area">
        <div id="q-text">準備戰鬥...</div>
        <center>
            <input type="number" id="ans-input" inputmode="decimal" placeholder="?">
        </center>
        <button id="atk-btn" class="action-btn" onclick="checkAnswer()">發動攻擊 ⚔️</button>
        <div id="msg" style="font-size: 7px; margin-top: 10px; height: 10px; color: #d35400;"></div>
    </div>

    <span class="back-link" onclick="location.href='menu.html'">撤退回公會</span>
</div>

<script>
    // 遊戲邏輯保持與原本一致，但更新 UI 反饋
    let player = JSON.parse(localStorage.getItem('currentPlayer')) || {lv:1, hp:100, atk:10, def:5, spi:10, job:'新手'};
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZDRO5S3zM1EPcPxMVQUGzzARD2L05XnuYzHYl5WPPh36et2lVRJYKkNlDx_-rXNSv/exec";

    let state = {
        lv: parseInt(player.lv),
        hp: parseInt(player.hp),
        maxHp: parseInt(player.hp),
        atk: parseInt(player.atk),
        spi: parseInt(player.spi),
        ans: 0,
        mHP: 100,
        mMaxHP: 100
    };

    const icons = {'戰士':'🤺', '魔法師':'🧙', '神射手':'🏹', '新手':'👤'};

    window.onload = () => {
        document.getElementById('player-sprite').innerText = icons[player.job] || '👤';
        nextMonster();
    };

    function nextMonster() {
        state.mMaxHP = 50 + (state.lv * 20);
        state.mHP = state.mMaxHP;
        const emoji = ["👾", "👹", "👻", "🤖", "🦁"];
        document.getElementById('monster-sprite').innerText = emoji[Math.floor(Math.random()*emoji.length)];
        updateUI();
        generateQuestion();
    }

    function generateQuestion() {
        const inp = document.getElementById('ans-input');
        inp.value = ''; inp.focus();
        const nums = [5, 10, 15, 20, 8, 12, 25];
        let v = nums[Math.floor(Math.random()*nums.length)];
        let isC = Math.random() > 0.5;
        
        if(isC) {
            state.ans = v * 3;
            document.getElementById('q-text').innerHTML = `直徑為 ${v}<br>求「圓周」是多少？`;
        } else {
            state.ans = v;
            document.getElementById('q-text').innerHTML = `圓周為 ${v * 3}<br>求「直徑」是多少？`;
        }
    }

    function checkAnswer() {
        const val = parseFloat(document.getElementById('ans-input').value);
        const btn = document.getElementById('atk-btn');
        if(isNaN(val)) return;

        if(Math.abs(val - state.ans) < 0.1) {
            executeAttack();
        } else {
            // 答錯扣血
            state.hp -= 15;
            showMsg("MISS! 受到反擊!", "#e74c3c");
            document.getElementById('player-sprite').classList.add('shake');
            setTimeout(()=>document.getElementById('player-sprite').classList.remove('shake'), 200);
            updateUI();
            if(state.hp <= 0) {
                alert("你不支倒地...撤退回公會。");
                location.href = 'menu.html';
            }
            generateQuestion();
        }
    }

    function executeAttack() {
        showMsg("HIT! 正確回答!", "#27ae60");
        const p = document.getElementById('player-sprite');
        p.style.transform = 'translateX(100px)';
        
        // 簡單傷害計算
        state.mHP -= (state.atk + state.spi);
        
        setTimeout(() => {
            p.style.transform = 'translateX(0)';
            document.getElementById('monster-sprite').classList.add('shake');
            setTimeout(()=>document.getElementById('monster-sprite').classList.remove('shake'), 200);
            updateUI();
            
            if(state.mHP <= 0) {
                processVictory();
            } else {
                generateQuestion();
            }
        }, 200);
    }

    function processVictory() {
        state.lv++;
        state.atk += 2;
        state.maxHp += 10;
        state.hp = state.maxHp;
        
        showMsg("LEVEL UP!!", "#d35400");
        
        // 保存資料
        player.lv = state.lv;
        player.hp = state.maxHp;
        player.atk = state.atk;
        localStorage.setItem('currentPlayer', JSON.stringify(player));
        
        // 雲端同步
        sync(player);

        setTimeout(nextMonster, 1000);
    }

    function updateUI() {
        document.getElementById('p-lv').innerText = state.lv;
        document.getElementById('p-hp-bar').style.width = (state.hp / state.maxHp * 100) + '%';
        document.getElementById('m-hp-bar').style.width = Math.max(0, state.mHP / state.mMaxHP * 100) + '%';
    }

    function showMsg(txt, color) {
        const m = document.getElementById('msg');
        m.innerText = txt;
        m.style.color = color;
    }

    function sync(data) {
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "cors",
            body: JSON.stringify({ action: "save", id: data.id, pw: data.pw, data: data })
        }).catch(e => console.log("Sync error"));
    }
</script>

</body>
</html>
