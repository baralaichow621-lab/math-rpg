<style>
    /* ... 略過 ... */
    .question-highlight { background: #0f172a; border: 2px solid #3b82f6; box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.2); }
    
    /* 確保單行顯示的調整 */
    #q-box { 
        font-size: 1.15rem; /* 稍微縮小字體以確保單行 */
        white-space: nowrap; /* 強制不換行 */
        overflow: hidden;
        text-overflow: ellipsis;
    }
    /* ... 略過 ... */
</style>

<script>
    // ... 初始化資料與 state 保持不變 ...
    let state = {
        // ... 其他屬性 ...
        pi: 3.14, // 預設值
        ans: 0
    };

    function generateQuestion() {
        const inp = document.getElementById('ans-input');
        inp.value = ''; inp.focus();

        // 隨機切換圓周率類型
        const useFractionPi = Math.random() > 0.5;
        const piVal = useFractionPi ? (22 / 7) : 3.14;
        const piText = useFractionPi ? "22/7" : "3.14";
        
        // 根據圓周率類型選擇適合的數字（如果是 22/7，選 7 的倍數）
        const nums = useFractionPi ? [7, 14, 21, 28, 35] : [5, 10, 20, 25, 40];
        const v = nums[Math.floor(Math.random() * nums.length)];
        
        const type = Math.floor(Math.random() * 3); 
        let qHtml = "";

        if (type === 0) { // 求圓周
            state.ans = v * piVal;
            qHtml = `直徑 <span class="text-blue-400">${v}</span>，求 <span class="text-yellow-400 underline">圓周</span>？ (π≈${piText})`;
        } 
        else if (type === 1) { // 半徑轉直徑 (基礎題)
            state.ans = v * 2;
            qHtml = `半徑 <span class="text-blue-400">${v}</span>，求 <span class="text-yellow-400 underline">直徑</span>？`;
        } 
        else { // 已知圓周求直徑
            // 為了讓答案好算，這裡反向生成題目
            const circleVal = (v * piVal).toFixed(2);
            state.ans = v;
            qHtml = `圓周 <span class="text-yellow-400">${circleVal}</span>，求 <span class="text-blue-400 underline">直徑</span>？ (π≈${piText})`;
        }

        document.getElementById('q-box').innerHTML = qHtml;
    }

    async function checkAnswer() {
        const val = parseFloat(document.getElementById('ans-input').value);
        if (isNaN(val)) return;

        // 考慮到 22/7 可能會有小數點誤差，增加判斷寬容度
        if (Math.abs(val - state.ans) < 0.11) {
            await executeAttack();
        } else {
            // 錯誤處理邏輯保持不變...
            const dmg = 10 + (state.lv * 2);
            state.hp -= dmg;
            document.getElementById('feedback').innerText = `錯誤！正確應為 ${state.ans.toFixed(2)}`;
            document.getElementById('feedback').style.color = "#ef4444";
            updateUI();
            if(state.hp <= 0) {
                alert("力竭撤退！");
                location.href = 'menu.html';
            } else generateQuestion();
        }
    }
    // ... 其餘函數（executeAttack, updateUI 等）保持不變 ...
</script>
