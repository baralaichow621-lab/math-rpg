<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圓周魔王大戰 - 副本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #020617; color: white; margin: 0;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; touch-action: manipulation;
        }

        .rpg-font { font-family: 'ZCOOL KuaiLe', cursive; }
        #stage {
            position: relative; height: 160px;
            background: linear-gradient(to bottom, #1e293b 0%, #334155 100%);
            border-bottom: 8px solid #475569;
        }

        .entity { position: absolute; bottom: 10px; transition: all 0.3s cubic-bezier(0.17, 0.88, 0.32, 1.2); font-size: 60px; user-select: none; }
        #player-sprite { left: 30px; z-index: 30; }
        #monster-sprite { right: 30px; z-index: 30; }

        .projectile { position: absolute; pointer-events: none; z-index: 40; transition: transform 0.4s linear, opacity 0.2s; }
        .proj-mage { width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle, #fff, #3b82f6); box-shadow: 0 0 15px #3b82f6; }
        .proj-warrior { width: 45px; height: 8px; border-radius: 4px; background: #fbbf24; box-shadow: 0 0 10px #f59e0b; }
        .proj-archer { width: 35px; height: 3px; background: #e2e8f0; box-shadow: 0 0 5px #fff; }

        @keyframes float-up { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }
        .growth-text { position: absolute; font-weight: bold; color: #4ade80; animation: float-up 1.2s forwards; pointer-events: none; z-index: 100; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .question-highlight { background: #0f172a; border: 2px solid #3b82f6; box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.2); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* 返回按鈕樣式 */
        .back-btn { position: absolute; top: 10px; left: 10px; font-size: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; z-index: 50; border: 1px solid #475569; }
    </style>
</head>
<body>

    <div id="game-ui" class="w-full max-w-md bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl relative mx-2 border-4 border-slate-800 h-[750px] flex flex-col">
        
        <button class="back-btn" onclick="location.href='menu.html'">⬅ 撤退回公會</button>

        <div id="main-game" class="flex-1 flex flex-col">
            <div id="growth-container" class="absolute inset-0 pointer-events-none"></div>

            <div class="p-4 bg-slate-950 border-b border-slate-800 pt-12">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex flex-col">
                        <div class="flex items-center gap-2">
                            <span id="p-name-disp" class="text-sm font-bold text-white">載入中...</span>
                            <span id="job-title" class="text-[10px] font-bold text-blue-400 uppercase italic">JOB</span>
                        </div>
                        <span class="text-xl font-black italic text-yellow-500">LV.<span id="p-lv-disp">1</span></span>
                    </div>
                    <div id="stats-panel" class="flex gap-1">
                        <div class="stat-badge bg-slate-800 px-2 py-1 rounded text-[10px] text-red-400 border border-slate-700">ATK <span id="s-atk">0</span></div>
                        <div class="stat-badge bg-slate-800 px-2 py-1 rounded text-[10px] text-blue-400 border border-slate-700">INT <span id="s-int">0</span></div>
                        <div class="stat-badge bg-slate-800 px-2 py-1 rounded text-[10px] text-yellow-400 border border-slate-700">DEF <span id="s-def">0</span></div>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <div class="flex justify-between text-[10px] mb-1 font-bold text-slate-400"><span>HP 生命</span><span id="hp-text">0/0</span></div>
                        <div class="h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                            <div id="p-hp-bar" class="h-full bg-gradient-to-r from-red-500 to-rose-400 transition-all duration-300" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="stage">
                <div id="player-sprite" class="entity">👤</div>
                <div id="monster-sprite" class="entity">👾</div>
                <div class="absolute top-2 right-4 text-right">
                    <p id="m-name-disp" class="text-[10px] font-bold text-red-400 uppercase mb-1">怪物</p>
                    <div class="w-32 h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                        <div id="m-hp-bar" class="h-full bg-red-500 transition-all duration-300" style="width: 100%"></div>
                    </div>
                </div>
            </div>

            <div class="p-5 flex-1 flex flex-col justify-center space-y-4">
                <div class="question-highlight p-6 rounded-3xl text-center border-2 border-blue-900">
                    <div id="q-box" class="text-2xl font-bold text-white leading-relaxed">題目載入中...</div>
                </div>
                <input type="number" id="ans-input" inputmode="decimal" placeholder="輸入答案" 
                    class="w-full bg-black border-2 border-slate-700 rounded-2xl p-4 text-center text-5xl font-black text-blue-400 focus:border-blue-500 outline-none">
                <button id="atk-btn" onclick="checkAnswer()" class="w-full bg-gradient-to-b from-blue-500 to-blue-700 p-5 rounded-2xl font-black text-2xl text-white shadow-[0_4px_0_rgb(29,78,216)] active:translate-y-1 active:shadow-none transition-all">
                    發動攻擊 💥
                </button>
                <p id="feedback" class="text-center h-4 text-xs font-bold uppercase"></p>
            </div>
        </div>
    </div>

    <script>
        // 1. 初始化資料 (從 localStorage 讀取)
        let player = JSON.parse(localStorage.getItem('currentPlayer'));
        
        if (!player) {
            alert("偵測不到冒險者資料，請重新登入。");
            window.location.href = 'index.html';
        }

        // 遊戲狀態與設定
        let state = {
            lv: parseInt(player.lv) || 1,
            hp: parseInt(player.hp) || 100,
            maxHp: parseInt(player.hp) || 100,
            atk: parseInt(player.atk) || 10,
            def: parseInt(player.def) || 5,
            int: parseInt(player.spi) || 10, // 將 spi 對應到遊戲內的 int
            pi: 3,
            ans: 0,
            mHP: 100,
            mMaxHP: 100
        };

        const jobConfig = {
            '戰士': { icon: '🤺', growth: { hp: 0.7, atk: 0.7, def: 0.7, int: 0.3 }, mainStat: 'atk' },
            '魔法師': { icon: '🧙', growth: { hp: 0.3, atk: 0.5, def: 0.3, int: 0.9 }, mainStat: 'int' },
            '神射手': { icon: '🏹', growth: { hp: 0.5, atk: 0.7, def: 0.5, int: 0.7 }, mainStat: 'atk' },
            '新手': { icon: '👤', growth: { hp: 0.5, atk: 0.5, def: 0.5, int: 0.5 }, mainStat: 'atk' }
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZDRO5S3zM1EPcPxMVQUGzzARD2L05XnuYzHYl5WPPh36et2lVRJYKkNlDx_-rXNSv/exec";

        // 音效
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function sfx(f, d, t='sine', v=0.1) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        window.onload = () => {
            // 初始化畫面
            document.getElementById('p-name-disp').innerText = player.name;
            document.getElementById('job-title').innerText = player.job;
            document.getElementById('player-sprite').innerText = jobConfig[player.job]?.icon || '👤';
            
            updateUI();
            nextMonster();
        };

        function nextMonster() {
            state.mMaxHP = 70 + (state.lv * 35);
            state.mHP = state.mMaxHP;
            const emoji = ["👾", "👹", "🐉", "👻", "🤖", "🦁", "🦇"];
            document.getElementById('monster-sprite').innerText = emoji[Math.floor(Math.random()*emoji.length)];
            document.getElementById('m-name-disp').innerText = `LV.${state.lv} 守衛`;
            updateUI();
            generateQuestion();
        }

        function generateQuestion() {
            const inp = document.getElementById('ans-input');
            inp.value = ''; inp.focus();
            const nums = [5, 10, 15, 20, 4, 8, 25, 12, 30];
            let v = nums[Math.floor(Math.random()*nums.length)];
            let isC = Math.random() > 0.5;
            
            if(isC) {
                state.ans = v * state.pi;
                document.getElementById('q-box').innerHTML = `直徑為 <span class="text-blue-400">${v}</span><br>求 <span class="text-yellow-400 underline">圓周</span>？ (π=3)`;
            } else {
                state.ans = v;
                document.getElementById('q-box').innerHTML = `圓周為 <span class="text-yellow-400">${v * state.pi}</span><br>求 <span class="text-blue-400 underline">直徑</span>？ (π=3)`;
            }
        }

        async function checkAnswer() {
            const val = parseFloat(document.getElementById('ans-input').value);
            if(isNaN(val)) return;

            if(Math.abs(val - state.ans) < 0.1) {
                await executeAttack();
            } else {
                const dmg = 10 + (state.lv * 2);
                state.hp -= dmg;
                sfx(100, 0.4, 'sawtooth');
                document.getElementById('feedback').innerText = `回答錯誤！失去 ${dmg} HP`;
                document.getElementById('feedback').style.color = "#ef4444";
                updateUI();
                if(state.hp <= 0) {
                    alert("力竭撤退！回公會休息吧。");
                    location.href = 'menu.html';
                } else generateQuestion();
            }
        }

        async function executeAttack() {
            const btn = document.getElementById('atk-btn');
            btn.disabled = true;
            document.getElementById('feedback').innerText = "正確！發動攻擊！";
            document.getElementById('feedback').style.color = "#4ade80";

            // 計算傷害
            const mainStatVal = state[jobConfig[player.job]?.mainStat || 'atk'];
            const dmg = mainStatVal * 3;

            // 動畫
            const p = document.getElementById('player-sprite');
            p.style.transform = 'translateX(180px) rotate(15deg)';
            setTimeout(() => p.style.transform = 'translateX(0)', 150);
            
            sfx(440, 0.15);
            state.mHP -= dmg;
            updateUI();

            if(state.mHP <= 0) {
                await processVictory();
            } else {
                setTimeout(() => {
                    btn.disabled = false;
                    generateQuestion();
                }, 400);
            }
        }

        async function processVictory() {
            // 升級數值
            const config = jobConfig[player.job] || jobConfig['新手'];
            let logs = [];
            
            state.lv++;
            if(Math.random() < config.growth.hp) { state.maxHp += 10; state.hp = state.maxHp; logs.push("HP+"); }
            if(Math.random() < config.growth.atk) { state.atk += 2; logs.push("ATK+"); }
            if(Math.random() < config.growth.def) { state.def += 1; logs.push("DEF+"); }
            if(Math.random() < config.growth.int) { state.int += 2; logs.push("SPI+"); }

            // 顯示成長字體
            logs.forEach((txt, i) => {
                const el = document.createElement('div');
                el.className = "growth-text";
                el.innerText = txt;
                el.style.left = (80 + i*40) + 'px';
                el.style.top = '150px';
                document.getElementById('growth-container').appendChild(el);
                setTimeout(() => el.remove(), 1200);
            });

            sfx(523, 0.1); setTimeout(()=>sfx(783, 0.2), 150);

            // 💾 同步回 localStorage
            player.lv = state.lv;
            player.hp = state.maxHp;
            player.atk = state.atk;
            player.def = state.def;
            player.spi = state.int;
            localStorage.setItem('currentPlayer', JSON.stringify(player));

            // ☁️ 同步回 Google Sheets (非阻塞)
            syncToSheets(player);

            setTimeout(() => {
                document.getElementById('atk-btn').disabled = false;
                nextMonster();
            }, 1300);
        }

        function updateUI() {
            document.getElementById('p-lv-disp').innerText = state.lv;
            document.getElementById('s-atk').innerText = state.atk;
            document.getElementById('s-int').innerText = state.int;
            document.getElementById('s-def').innerText = state.def;
            document.getElementById('hp-text').innerText = `${state.hp}/${state.maxHp}`;
            document.getElementById('p-hp-bar').style.width = (state.hp / state.maxHp * 100) + '%';
            document.getElementById('m-hp-bar').style.width = Math.max(0, state.mHP / state.mMaxHP * 100) + '%';
        }

        async function syncToSheets(data) {
            try {
                fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "cors",
                    body: JSON.stringify({ 
                        action: "save", // 確保你的 GAS 有處理這個 action
                        id: data.id,
                        pw: data.pw,
                        data: data 
                    })
                });
            } catch (e) { console.error("雲端同步失敗"); }
        }

        // Enter 鍵提交
        document.getElementById('ans-input').addEventListener('keypress', e => {
            if(e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
