<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冒險者公會 - 登錄所</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; background: #1a1a2e;
            background-image: radial-gradient(circle, #2a2a4e 1px, rgba(0,0,0,0) 1px);
            background-size: 20px 20px;
            font-family: 'Press Start 2P', monospace; color: #4a3421;
        }

        .rpg-card { 
            background: #f1e7c0; background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            padding: 30px; border-radius: 4px; 
            box-shadow: 0 0 0 8px #4a3421, 0 0 0 16px #8b5a2b, 0 20px 40px rgba(0,0,0,0.5);
            width: 100%; max-width: 440px; text-align: center; border: 4px solid #f1e7c0;
            position: relative; overflow: hidden;
        }

        h2 { color: #8b5a2b; margin-bottom: 20px; font-size: 16px; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        
        /* 職業選擇卡片樣式 */
        .job-container { display: none; text-align: left; margin-top: 20px; }
        .job-option { 
            background: rgba(139, 90, 43, 0.1); border: 3px solid #8b5a2b; 
            margin-bottom: 10px; padding: 10px; cursor: pointer; transition: 0.2s;
        }
        .job-option:hover { background: #8b5a2b; color: #fff8e1; transform: scale(1.02); }
        .job-name { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; }
        .job-desc { font-size: 8px; line-height: 1.4; pointer-events: none; }

        input { 
            width: 100%; padding: 12px 10px; margin: 10px 0; border: 4px solid #8b5a2b;
            background: #fff8e1; font-family: 'Press Start 2P', monospace;
            font-size: 12px; color: #4a3421; box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 15px; background: #8b5a2b;
            background-image: linear-gradient(to bottom, #a06e3e 0%, #8b5a2b 100%);
            color: #fff8e1; border: 4px solid #4a3421; font-family: 'Press Start 2P', monospace;
            font-size: 12px; cursor: pointer; margin-top: 10px;
            text-shadow: 2px 2px 0px #4a3421; box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 4px 0 #4a3421;
        }
        button:active { transform: translateY(4px); box-shadow: none; }

        #message { margin-top: 20px; font-size: 10px; line-height: 1.6; min-height: 40px; }
        #particles-js { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        
        .stat-val { color: #d35400; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="rpg-card">
    <div id="login-ui">
        <h2>🏰 冒險者公會<br>身份認證</h2>
        <input type="text" id="stu-id" placeholder="ID (學號)">
        <input type="password" id="stu-pw" placeholder="PW (密碼)">
        <button id="login-btn" onclick="handleLogin()">遞交登錄書</button>
    </div>

    <div id="job-ui" class="job-container">
        <h2 style="font-size: 14px;">✨ 選擇你的宿命</h2>
        <p style="font-size: 8px; text-align:center; margin-bottom:15px;">新進冒險者，請選擇職業：</p>
        
        <div class="job-option" onclick="pickJob('戰士', {hp:100, mp:10, atk:5, def:5, spi:1})">
            <span class="job-name">🛡️ 戰士 (Warrior)</span>
            <span class="job-desc">HP:100 MP:10 ATK:5 DEF:5 SPI:1<br>擁有極高的生命力值與防禦。</span>
        </div>

        <div class="job-option" onclick="pickJob('法師', {hp:50, mp:60, atk:3, def:1, spi:5})">
            <span class="job-name">🧙 法師 (Mage)</span>
            <span class="job-desc">HP:50 MP:60 ATK:3 DEF:1 SPI:5<br>精通精神奧秘，魔力深不可測。</span>
        </div>

        <div class="job-option" onclick="pickJob('弓手', {hp:80, mp:30, atk:4, def:3, spi:2})">
            <span class="job-name">🏹 弓手 (Archer)</span>
            <span class="job-desc">HP:80 MP:30 ATK:4 DEF:3 SPI:2<br>能力均衡的獵人，擅長遠程打擊。</span>
        </div>
    </div>

    <div id="loading" style="display:none; font-size: 10px; margin-top: 10px; color:#6f4e37;">正在連線占卜池...</div>
    <div id="message"></div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZDRO5S3zM1EPcPxMVQUGzzARD2L05XnuYzHYl5WPPh36et2lVRJYKkNlDx_-rXNSv/exec";
    let tempUserData = null; // 暫存登入成功後的基礎資料

    particlesJS('particles-js', {
        particles: {
            number: { value: 40 }, color: { value: '#fff' },
            opacity: { value: 0.2 }, size: { value: 2 },
            move: { enable: true, speed: 1, direction: 'none', random: true }
        }
    });

    async function handleLogin() {
        const id = document.getElementById('stu-id').value;
        const pw = document.getElementById('stu-pw').value;
        const msg = document.getElementById('message');
        const loading = document.getElementById('loading');
        
        if (!id || !pw) {
            msg.style.color = "#e74c3c";
            msg.innerText = "× 請填寫完整公會代號與密碼";
            return;
        }

        msg.innerText = "";
        loading.style.display = "block";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "login", id: id, pw: pw })
            });
            const result = await response.json();

            if (result.status === "success") {
                tempUserData = { id: id, ...result.data };
                
                // 檢查是否已有職業
                if (!tempUserData.job || tempUserData.job === "" || tempUserData.job === "新手") {
                    showJobSelection();
                } else {
                    completeLogin(tempUserData);
                }
            } else {
                msg.style.color = "#e74c3c";
                msg.innerText = "× " + result.msg;
            }
        } catch (error) {
            msg.style.color = "#e74c3c";
            msg.innerText = "× 連線失敗，請檢查網路";
        } finally {
            loading.style.display = "none";
        }
    }

    function showJobSelection() {
        document.getElementById('login-ui').style.display = "none";
        document.getElementById('job-ui').style.display = "block";
        document.getElementById('message').innerText = "✨ 檢測到新血，請選擇起始職業！";
    }

    async function pickJob(jobName, stats) {
        const msg = document.getElementById('message');
        const loading = document.getElementById('loading');
        
        if(!confirm(`確定要以 ${jobName} 的身份開始冒險嗎？`)) return;

        document.getElementById('job-ui').style.display = "none";
        loading.style.display = "block";
        msg.innerText = "正在將契約寫入星辰...";

        // 整合玩家完整數據
        const finalData = {
            ...tempUserData,
            job: jobName,
            lv: 1,
            hp: stats.hp,
            mp: stats.mp,
            atk: stats.atk,
            def: stats.def,
            spi: stats.spi
        };

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "save", ...finalData })
            });
            
            completeLogin(finalData);
        } catch (e) {
            alert("同步失敗，請重新嘗試！");
            document.getElementById('job-ui').style.display = "block";
            loading.style.display = "none";
        }
    }

    function completeLogin(player) {
        localStorage.setItem('currentPlayer', JSON.stringify(player));
        
        const msg = document.getElementById('message');
        msg.style.color = "#27ae60";
        msg.innerHTML = `✅ 冒險者「${player.name}」已登入<br>` + 
                        `<span style="font-size:8px;">[${player.job}] LV:${player.lv} ATK:${player.atk} DEF:${player.def}</span>`;
        
        setTimeout(() => {
            window.location.href = "menu.html";
        }, 2000);
    }
</script>

</body>
</html>
