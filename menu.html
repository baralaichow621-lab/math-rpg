<script>
    // ⚠️ 請確保這裡的網址與 index.html 的一致
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZDRO5S3zM1EPcPxMVQUGzzARD2L05XnuYzHYl5WPPh36et2lVRJYKkNlDx_-rXNSv/exec";

    window.onload = async function() {
        const localData = localStorage.getItem('currentPlayer');
        
        if (!localData) {
            alert("尚未偵測到冒險者身份，請先登錄！");
            window.location.href = "index.html";
            return;
        }

        let player = JSON.parse(localData);

        // --- 🔄 新增：從 Google Sheets 同步最新數值 ---
        try {
            // 向 GAS 發送同步請求 (假設你的 GAS 支援 action: "get_data")
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "login", // 這裡沿用 login 邏輯來重新抓取該 ID 的最新整列數據
                    id: player.id, 
                    pw: player.pw // 如果你的 GAS 驗證需要密碼，請確保存儲了密碼
                })
            });
            
            const result = await response.json();
            if (result.status === "success") {
                // 更新最新的數據並存回 localStorage
                player = { id: player.id, ...result.data };
                localStorage.setItem('currentPlayer', JSON.stringify(player));
                console.log("數據已與公會總部同步");
            }
        } catch (e) {
            console.warn("無法同步最新數據，將使用本地暫存資料。", e);
        }

        // --- 📊 渲染介面 ---
        renderPlayerInfo(player);
    };

    function renderPlayerInfo(player) {
        // 填入文字資料
        document.getElementById('name-val').innerText = player.name || "未知冒險者";
        document.getElementById('job-val').innerText = player.job || "新手";
        document.getElementById('lv-val').innerText = player.lv || 1;
        document.getElementById('atk-val').innerText = player.atk || 0;
        document.getElementById('def-val').innerText = player.def || 0;
        document.getElementById('spi-val').innerText = player.spi || 0;

        // 設定 HP/MP 數值
        document.getElementById('hp-cur').innerText = player.hp;
        document.getElementById('hp-max').innerText = player.hp; // 假設目前最大值等於初始值
        document.getElementById('mp-cur').innerText = player.mp;
        document.getElementById('mp-max').innerText = player.mp;

        // 啟動進度條動畫
        setTimeout(() => {
            document.getElementById('hp-fill').style.width = "100%";
            document.getElementById('mp-fill').style.width = "100%";
        }, 300);
    }

    function startQuest(type) {
        if (type === 'dungeon') {
            alert("正在前往副本：數學森林...");
            // window.location.href = "ten.html"; // 導向你的遊戲頁面
        } else {
            alert("號召隊友中... 大型討伐即將開始！");
        }
    }

    function logout() {
        if(confirm("確定要離開公會嗎？")) {
            localStorage.removeItem('currentPlayer');
            window.location.href = "index.html";
        }
    }
</script>
